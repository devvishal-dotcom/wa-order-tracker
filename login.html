<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WA Tracker — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:#0d1117;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#161b22;border:1px solid #1e2530;border-radius:16px;padding:40px;width:100%;max-width:400px}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.logo-icon{width:40px;height:40px;background:#00c853;border-radius:10px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:22px;height:22px;fill:#fff}
.logo-text{font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.title{font-size:22px;font-weight:700;color:#fff;text-align:center;margin-bottom:6px}
.subtitle{font-size:13px;color:#4a5568;text-align:center;margin-bottom:28px;font-family:'DM Mono',monospace}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:#8890a8;margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
.form-input{width:100%;padding:12px 16px;border:1px solid #1e2530;border-radius:10px;font-size:14px;font-family:'Syne',sans-serif;color:#fff;background:#0d1117;outline:none;transition:border .15s}
.form-input:focus{border-color:#00c853;box-shadow:0 0 0 3px rgba(0,200,83,.1)}
.form-input::placeholder{color:#4a5568}
.btn{width:100%;padding:13px;background:#00c853;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s;margin-top:8px}
.btn:hover{background:#00b848;transform:translateY(-1px)}
.btn:disabled{background:#1e4d30;color:#4a5568;cursor:not-allowed;transform:none}
.error{background:#1a0a0a;border:1px solid #4d1e1e;border-radius:8px;padding:10px 14px;font-size:12px;color:#ff5252;margin-top:12px;font-family:'DM Mono',monospace;display:none}
.footer{text-align:center;margin-top:24px;font-size:11px;color:#4a5568;font-family:'DM Mono',monospace}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </div>
    <div class="logo-text">WA Tracker</div>
  </div>

  <div class="title">Welcome Back</div>
  <div class="subtitle">Sign in to access the admin panel</div>

  <div class="form-group">
    <label class="form-label">Username</label>
    <input class="form-input" id="username" type="text" placeholder="Enter username" autocomplete="username">
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input class="form-input" id="password" type="password" placeholder="Enter password" autocomplete="current-password">
  </div>

  <button class="btn" id="login-btn" onclick="doLogin()">Sign In</button>
  <div class="error" id="error-msg"></div>

  <div class="footer">WA Order Tracker · Secure Admin Access</div>
</div>

<script>
// Use relative path - login page is served from same domain as API
const API_URL = '';

if(localStorage.getItem('wa_token')) {
  window.location.href = '/';
}

document.getElementById('password').addEventListener('keypress', e => {
  if(e.key === 'Enter') doLogin();
});

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('error-msg');

  if(!username || !password) { showError('Please enter username and password'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  errEl.style.display = 'none';

  try {
    const res = await fetch(`${API_URL}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if(data.success) {
      localStorage.setItem('wa_token', data.token);
      localStorage.setItem('wa_user', JSON.stringify(data.user));
      localStorage.setItem('wa_permissions', JSON.stringify(data.permissions));
      localStorage.setItem('wa_api_url', window.location.origin);
      window.location.href = '/';
    } else {
      showError(data.error || 'Login failed');
    }
  } catch(e) {
    showError('Cannot reach backend. Make sure server is running.');
  }

  btn.disabled = false;
  btn.textContent = 'Sign In';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = '✗ ' + msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
